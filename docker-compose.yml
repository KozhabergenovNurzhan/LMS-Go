services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: DEBUG

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: admin
      DB_PASSWORD: nurzhan2403
      DB_NAME: lmsdb
      SSL_MODE: disable

      JWT_SECRET: golang-kz
      JWT_ISSUER: kcell
      JWT_ACCESS_TTL: 30m
      JWT_REFRESH_TTL: 720h

      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.1
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://admin:nurzhan2403@postgres:5432/lmsdb?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: nurzhan2403
      POSTGRES_DB: lmsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lmsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
